# LianBot 业务逻辑配置（logic 层）
# 复制本文件为 logic.toml 后按需修改
# 所有段和字段均可选，缺失时使用编译期默认值

# ── 群聊总结 (smy) ────────────────────────────────────────────────────────────
[smy]
# 截图宽度（像素），默认 1200
# screenshot_width = 1200
#
# LLM 配置已迁至 runtime.toml [llm] 段，详见 runtime.example.toml

# ── GitHub Webhook ─────────────────────────────────────────────────────────────
[github]
# Webhook secret，与 GitHub 仓库设置里填写的一致
# 留空时 /webhook/github 路由自动禁用
secret = ""

# 订阅列表示例：
# [[github.subscriptions]]
# repo   = "你的用户名/仓库名"
# events = ["push", "pull_request", "issues", "release"]
# group  = 123456789      # 通知推送到哪个群
# at     = []             # 通知时 @ 的 QQ 号列表（可为空）

# ── 设备在线状态 (alive) ───────────────────────────────────────────────────────
# [alive]
# api_url      = "https://your-alive-api.example.com/api/status"
# timeout_secs = 5

# ── 随机二次元图片 (acg) ──────────────────────────────────────────────────────
# [acg]
# api_url = "https://www.loliapi.com/bg/"

# ── AI 对话 (chat) ────────────────────────────────────────────────────────────
# [chat]
# 人格设定（支持多行）
# persona = """
# 你是小恋，一个17岁的猫娘少女，同时也是一个小魔女。
# 说话偶尔带"喵"，语气温柔但会傲娇。
# 你聪明、博学，对技术和日常话题都能给出有用的回答。
# """
#
# context_size = 50        # 最多取几条 Pool 消息作为上下文
# context_window = 7200    # 最远回溯几秒（默认 2h）
# temperature = 0.8        # LLM 温度
# max_tokens = 2048        # 单次回复 token 上限
#
# split_max_chars = 300    # 单段超过此长度则按句切割
# merge_min_chars = 20     # 短于此长度与上一段合并
# forward_threshold = 5    # 超过此段数用合并转发
# send_delay_ms = 600      # 多条消息之间的发送间隔（毫秒）
#
# enable_tools = false     # 启用 LLM Tool-Call（允许 AI 自动调用 Bot 命令，如 alive/stalk/world）

# ── 易班签到 Webhook (yiban) ──────────────────────────────────────────────────
# [yiban]
# HMAC-SHA256 签名密钥，与 LianSign config.toml 中 webhook.secret 一致
# 留空时跳过验签
# secret = ""
#
# LianSign HTTP 服务地址（sign 命令需要），如 http://127.0.0.1:9090
# api_url   = ""
#
# LianSign HTTP 服务的 Bearer token（与 LianSign config.toml server.token 一致）
# api_token = ""
#
# 推送目标列表（targets 为空时 /webhook/yiban 路由自动禁用）：
# [[yiban.targets]]
# users = ["Yosa"]            # 匹配用户名（空数组 = 匹配全部用户）
# group = 123456789           # 推送到哪个群
# at    = [1303028790]        # 通知时 @ 的 QQ 号列表（可为空）

# ── 60秒看世界 (world) ────────────────────────────────────────────────────────
# [world]
# api_url = "https://api.ecylt.com/v1/world_60s"
