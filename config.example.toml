# LianBot 配置文件
# 复制本文件为 config.toml 后填入实际值

# ── Bot 服务监听 ──────────────────────────────────────────────────────────────
[server]
host = "0.0.0.0"
port = 8080

# ── 命令前缀 ──────────────────────────────────────────────────────────────────
# 简单命令的触发前缀，默认 "!!"
# 例如设为 "!!" 时，使用 !!ping、!!help 触发命令
# 复杂命令始终使用 <命令名> 格式，不受此设置影响
# cmd_prefix = "!!"

# ── NapCat / go-cqhttp HTTP API ────────────────────────────────────────────────
[napcat]
url   = "http://127.0.0.1:3000"    # NapCat 监听地址
token = ""                          # Bearer Token（NapCat 未设置时留空即可）

# ── Bot 行为 ───────────────────────────────────────────────────────────────────
[bot]
# Bot 主人的 QQ 号（唯一，最高权限，不受黑名单影响）
owner = 123456789

# 权限数据库文件路径，默认 "permissions.db"
# db_path = "permissions.db"

# 初始群列表：首次启动时自动导入 permissions.db，已有记录则跳过
# 后续可通过管理命令动态增删群
initial_groups = [123456789, 987654321]

# ── LLM 配置 ─────────────────────────────────────────────────────────────────
# LLM 及其他插件私有配置已迁移至 plugins.toml
# 请参考 plugins.example.toml

# ── 消息池（框架基础设施） ──────────────────────────────────────────────────────
[pool]
# 每个群的内存缓冲最大条数，默认 3000
# 3000 条 PoolMessage(无 raw 字段)约占 150-240 KB，10 个群约 2-2.5 MB
# per_group_capacity = 3000

# 内存淘汰阈值（秒）：消息超过此时间后在下次写入时被清理，默认 1 天
# evict_after_secs = 86400

# ── 日志 ──────────────────────────────────────────────────────────────────────
# [log]
# 日志文件目录（相对工作目录或绝对路径），不设置则仅输出到 stdout / journald
# log_dir  = "/opt/lianbot/logs"

# 保留天数，超出则在启动时自动清理旧文件，默认 30 天
# max_days = 30

# 日志级别（trace/debug/info/warn/error），默认 info
# level = "info"
