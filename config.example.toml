# LianBot 配置文件
# 复制本文件为 config.toml 后填入实际值

# ── Bot 服务监听 ──────────────────────────────────────────────────────────────
[server]
host = "0.0.0.0"
port = 8080

# ── NapCat / go-cqhttp HTTP API ────────────────────────────────────────────────
[napcat]
url   = "http://127.0.0.1:3000"    # NapCat 监听地址
token = ""                          # Bearer Token（NapCat 未设置时留空即可）

# ── Bot 行为 ───────────────────────────────────────────────────────────────────
[bot]
# 允许 Bot 响应的群号白名单，空列表 = 响应所有群（不推荐）
whitelist = [123456789, 987654321]

# 用户白名单：非空时仅响应列表内的 QQ 号（优先级高于黑名单）
# 留空 = 不限制
# user_whitelist = [111111111]

# 用户黑名单：永远忽略这些 QQ 号（user_whitelist 非空时此项无效）
# user_blacklist = [222222222, 333333333]

# ── LLM 配置 ─────────────────────────────────────────────────────────────────
# LLM 及其他插件私有配置已迁移至 plugins.toml
# 请参考 plugins.example.toml

# ── 消息池（框架基础设施） ──────────────────────────────────────────────────────
[pool]
# 每个群的内存缓冲最大条数，默认 2000
# 2000 条 PoolMessage(无 raw 字段)约占 100-160 KB，10 个群仅 ~1.5 MB
# per_group_capacity = 2000

# 内存淘汰阈值（秒）：消息超过此时间后在下次写入时被清理，默认 1 天
# evict_after_secs = 86400

# 以下选项仅在编译时启用 --features core-pool-sqlite 后生效

# SQLite 数据库文件路径，默认 "lianbot.db"（当前目录）
# sqlite_path = "lianbot.db"

# SQLite 保留天数：超过此天数的记录在定期清理时删除，默认 30 天
# sqlite_retain_days = 30

# SQLite 每群最大保留条数，超出时删除最旧的记录，默认 50000
# sqlite_max_rows_per_group = 50000

# ── 日志 ──────────────────────────────────────────────────────────────────────
# [log]
# 日志文件目录（相对工作目录或绝对路径），不设置则仅输出到 stdout / journald
# log_dir  = "logs"

# 保留天数，超出则在启动时自动清理旧文件，默认 30 天
# max_days = 30

# 日志级别（trace/debug/info/warn/error），默认 info
# level = "info"
