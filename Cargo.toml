[package]
name = "LianBot"
version = "0.1.0"
edition = "2024"

[dependencies]
# Web 框架
axum = { version = "0.7", features = ["ws", "macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["trace"] }

# HTTP 客户端
reqwest = { version = "0.12", features = ["json"] }

# 序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# 配置 / 环境变量
dotenvy = "0.15"

# 错误处理
thiserror = "2"
anyhow = "1"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# 工具
async-trait = "0.1"
once_cell   = "1"
futures     = "0.3"
chrono      = { version = "0.4", features = ["serde"] }
base64      = "0.22"

# HTML 截图
headless_chrome = "1.0"

[profile.release]
opt-level      = 2
codegen-units  = 4
lto            = false
